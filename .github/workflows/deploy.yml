name: Deploy to host
on:
  push:
    paths-ignore:
      - README.md
    branches:
      - main
jobs:
  deploy:
    name: Deploy to host
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          lfs: true
    
      - name: Make build directory
        run: mkdir build
    
      - name: Build
        id: build
        uses: felix-schindler/build-godot-action@v2.0.0
        with:
          name: TiTOLPeli
          preset: Web
          debugMode: "false"

      - name: Deploy
        uses: up9cloud/action-rsync@master
        env:
          SOURCE: ${{ steps.build.outputs.build }}
          ARGS_MORE: --checksum
          VERBOSE: true

          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          USER: ${{ secrets.DEPLOY_USER }}
          KEY: ${{ secrets.SSH_KEY }}
          TARGET: ${{ secrets.DEPLOY_TARGET }}
